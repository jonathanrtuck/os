# Render benchmark baselines.
#
# Generated by: make bench-render -- --update-baseline
# Compare by:   make bench-render
#
# Thresholds include boot overhead in the first metrics period.

[typing]
# Boot + typing burst. First metrics period includes atlas init.
max_frame_avg_us = 2000
max_frame_max_us = 6000
max_walk_avg_us = 200

[idle]
# Clock-only ticks, no input. Measures render skip rate.
max_renders_per_sec = 40
min_idle_pct = 70
