[package]
name = "presenter-service"
version = "0.1.0"
edition = "2024"
license = "Unlicense"

[features]
default = ["service"]
service = [
    "dep:abi",
    "dep:console",
    "dep:document-service",
    "dep:heap",
    "dep:layout-service",
    "dep:name",
    "dep:render",
    "dep:scene",
    "dep:text-editor",
    "ipc/kernel",
]

[dependencies]
ipc = { path = "../../ipc", default-features = false }

abi = { path = "../../abi", optional = true }
console = { path = "../console", optional = true }
document-service = { path = "../document", optional = true }
heap = { path = "../../heap", optional = true }
layout-service = { path = "../layout", optional = true }
name = { path = "../name", optional = true }
render = { path = "../drivers/render", optional = true }
scene = { path = "../../../libraries/scene", optional = true }
text-editor = { path = "../../editors/text", optional = true }

[workspace]
