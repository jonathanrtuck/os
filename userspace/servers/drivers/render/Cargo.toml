[package]
name = "render"
version = "0.1.0"
edition = "2024"
license = "Unlicense"

[features]
default = ["baremetal"]
baremetal = ["dep:abi", "dep:console", "dep:heap", "dep:init", "dep:ipc", "dep:name", "dep:virtio"]

[dependencies]
abi = { path = "../../../abi", optional = true }
libm = "0.2"
animation = { path = "../../../../libraries/animation" }
console = { path = "../../console", optional = true }
fonts = { path = "../../../../libraries/fonts" }
heap = { path = "../../../heap", optional = true }
init = { path = "../../init", optional = true }
ipc = { path = "../../../ipc", optional = true }
name = { path = "../../name", optional = true }
icons = { path = "../../../../libraries/icons" }
scene = { path = "../../../../libraries/scene" }
virtio = { path = "../../../virtio", optional = true }

[workspace]
