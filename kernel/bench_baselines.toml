# Benchmark baselines for performance regression detection.
#
# Populated from bare-metal runs on M4 Pro via hypervisor.
# Re-run after any deliberate performance change to ratchet forward.
#
# Each benchmark has: median, p95, p99, stddev, threshold (p99 + 3*stddev).
# A measured median exceeding `threshold` is a regression.
#
# Timer frequency is 24 MHz (1 tick ≈ 42 ns).

[svc_null]
median = 1
p95 = 2
p99 = 2
stddev = 1
threshold = 5

