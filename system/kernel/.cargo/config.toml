[build]
target = "aarch64-unknown-none"

[target.aarch64-unknown-none]
runner = "qemu-system-aarch64 -machine virt,gic-version=2 -cpu cortex-a53 -smp 4 -m 256M -nographic -serial mon:stdio -global virtio-mmio.force-legacy=false -drive file=test.img,if=none,format=raw,id=hd0 -device virtio-blk-device,drive=hd0 -kernel"
rustflags = ["-C", "link-arg=-Tlink.ld"]
