commands:
  build: cd /Users/user/Sites/os/system && cargo build --release
  test: cd /Users/user/Sites/os/system/test && cargo test -- --test-threads=1
  test-prototype: cd /Users/user/Sites/os/prototype/files && cargo test
  smoke: cd /Users/user/Sites/os/system/test && ./smoke.sh
  integration: cd /Users/user/Sites/os/system/test && ./integration.sh

services:
  qemu:
    start: |
      cd /Users/user/Sites/os/system && \
      pkill -f qemu-system-aarch64 2>/dev/null; sleep 1; \
      rm -f /tmp/qemu-mon.sock /tmp/qemu-serial.log; \
      qemu-system-aarch64 \
        -machine virt,gic-version=2 \
        -cpu cortex-a53 -smp 4 -m 256M \
        -global virtio-mmio.force-legacy=false \
        -drive "file=test.img,if=none,format=raw,id=hd0" \
        -device virtio-blk-device,drive=hd0 \
        -device virtio-gpu-device -device virtio-keyboard-device \
        -fsdev "local,id=fsdev0,path=share,security_model=none" \
        -device "virtio-9p-device,fsdev=fsdev0,mount_tag=hostshare" \
        -nographic \
        -serial file:/tmp/qemu-serial.log \
        -monitor unix:/tmp/qemu-mon.sock,server,nowait \
        -device "loader,file=virt.dtb,addr=0x40000000,force-raw=on" \
        -kernel target/aarch64-unknown-none/release/kernel &
    stop: pkill -f qemu-system-aarch64 2>/dev/null
    healthcheck: sleep 8 && cat /tmp/qemu-serial.log | grep -q "compositor"
    port: null
    depends_on: []

  qemu-hires:
    start: |
      cd /Users/user/Sites/os/system && \
      pkill -f qemu-system-aarch64 2>/dev/null; sleep 1; \
      rm -f /tmp/qemu-mon.sock /tmp/qemu-serial.log; \
      qemu-system-aarch64 \
        -machine virt,gic-version=2 \
        -cpu cortex-a53 -smp 4 -m 256M \
        -global virtio-mmio.force-legacy=false \
        -drive "file=test.img,if=none,format=raw,id=hd0" \
        -device virtio-blk-device,drive=hd0 \
        -device virtio-gpu-device,xres=1920,yres=1080 \
        -device virtio-keyboard-device \
        -fsdev "local,id=fsdev0,path=share,security_model=none" \
        -device "virtio-9p-device,fsdev=fsdev0,mount_tag=hostshare" \
        -nographic \
        -serial file:/tmp/qemu-serial.log \
        -monitor unix:/tmp/qemu-mon.sock,server,nowait \
        -device "loader,file=virt.dtb,addr=0x40000000,force-raw=on" \
        -kernel target/aarch64-unknown-none/release/kernel &
    stop: pkill -f qemu-system-aarch64 2>/dev/null
    healthcheck: sleep 8 && cat /tmp/qemu-serial.log | grep -q "compositor"
    port: null
    depends_on: []

  qemu-mouse:
    start: |
      cd /Users/user/Sites/os/system && \
      pkill -f qemu-system-aarch64 2>/dev/null; sleep 1; \
      rm -f /tmp/qemu-mon.sock /tmp/qemu-serial.log; \
      qemu-system-aarch64 \
        -machine virt,gic-version=2 \
        -cpu cortex-a53 -smp 4 -m 256M \
        -global virtio-mmio.force-legacy=false \
        -drive "file=test.img,if=none,format=raw,id=hd0" \
        -device virtio-blk-device,drive=hd0 \
        -device virtio-gpu-device -device virtio-keyboard-device \
        -device virtio-tablet-device \
        -fsdev "local,id=fsdev0,path=share,security_model=none" \
        -device "virtio-9p-device,fsdev=fsdev0,mount_tag=hostshare" \
        -nographic \
        -serial file:/tmp/qemu-serial.log \
        -monitor unix:/tmp/qemu-mon.sock,server,nowait \
        -device "loader,file=virt.dtb,addr=0x40000000,force-raw=on" \
        -kernel target/aarch64-unknown-none/release/kernel &
    stop: pkill -f qemu-system-aarch64 2>/dev/null
    healthcheck: sleep 8 && cat /tmp/qemu-serial.log | grep -q "compositor"
    port: null
    depends_on: []

screenshots:
  capture: |
    echo "screendump /tmp/qemu-screen.ppm" | nc -U /tmp/qemu-mon.sock -w 2 >/dev/null 2>&1
    sleep 2
    python3 -c "from PIL import Image; Image.open('/tmp/qemu-screen.ppm').save('/tmp/qemu-screen.png')"
  sendkey: echo "sendkey {key}" | nc -U /tmp/qemu-mon.sock -w 1 >/dev/null 2>&1
  view: /tmp/qemu-screen.png
