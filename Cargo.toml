[workspace]
members = [
    "kernel",
    "libraries/scene",
    "libraries/drawing",
    "libraries/piecetable",
    "libraries/animation",
    "libraries/layout",
    "libraries/fs",
    "libraries/icons",
    "libraries/store",
    "libraries/fonts",
    "libraries/render",
]
exclude = ["kernel/fuzz", "userspace/init", "userspace/abi"]
resolver = "3"

[profile.dev]
panic = "abort"
opt-level = 1

[profile.release]
panic = "abort"
opt-level = 3
